<!DOCTYPE html>
<html>
<head>
    <title>Food Corner Restaurant</title>

    <style>

        body {
            margin: 0;
            font-family: Arial;
        }

        /* Navbar */

        nav {
            background: #b30000;
            color: white;
            padding: 15px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 15px;
            text-decoration: none;
            font-weight: bold;
        }

        /* Header */

        header {
            background: url("https://images.unsplash.com/photo-1504674900247-0877df9cc836");
            background-size: cover;
            color: white;
            padding: 80px;
            text-align: center;
        }

        /* Sections */

        .section {
            padding: 30px;
            text-align: center;
        }

        .menu {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .item {
            border: 1px solid gray;
            padding: 15px;
            width: 200px;
        }

        button {
            background: green;
            color: white;
            border: none;
            padding: 8px;
            cursor: pointer;
        }

        footer {
            background: black;
            color: white;
            text-align: center;
            padding: 10px;
        }

    </style>

    <script>
        function orderFood() {
            alert("Order placed successfully - JOEL");
        }
    </script>

</head>

<body>

<nav>
    <a href="#">Home</a>
    <a href="#">Menu</a>
    <a href="#">Contact</a>
</nav>

<header>
    <h1>Food Corner Restaurant</h1>
    <h3>Created by JOEL</h3>
</header>

<div class="section">

    <h2>Our Menu</h2>

    <div class="menu">

        <div class="item">
            <h3>Burger</h3>
            <p>₹120</p>
            <button onclick="orderFood()">Order</button>
        </div>

        <div class="item">
            <h3>Pizza</h3>
            <p>₹250</p>
            <button onclick="orderFood()">Order</button>
        </div>

        <div class="item">
            <h3>Juice</h3>
            <p>₹80</p>
            <button onclick="orderFood()">Order</button>
        </div>

    </div>

</div>

<footer>
    © 2026 Food Corner Website
</footer>

</body>
</html>
</html>
